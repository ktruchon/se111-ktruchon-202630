<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--always add your AUTHOR and DESCRIPTION tags!-->
    <meta name="author" content="KT">
    <meta name="description" content="W4 Demo">

    <title>Empire Records | CAST</title>

        <!--IN-DOCUMENT CSS BELOW-->
    <style>
        /*in here we write in CSS (NOT HTML or JS!)*/

        /*add a background image to the whole page*/
        body {
            background-image: url("images/records.jpg");
        }

        /*make the container smaller to center in page and expose background while creating depth*/
        #container {
            width:980px;
            padding:20px;
            margin:auto;
            border:2px solid black;
            box-shadow:0 0 8px black; /*adds drop shadow!*/
            border-radius: 15px; /*rounds corners of div*/
            background-color: rgba(33, 33, 33, 0.95);
            /*a = alpha channel, level of transparency*/
            color:white;
        }

        #header {
            text-align:center;
            padding:0;
            margin-bottom:0;
        }

        h1 {
            font-size:85px;
            padding:0;
            margin:0;
        }

        /*styling the site buttons to look like buttons*/
        #buttons {
            width:600px;
            height:60px;
            margin:auto;
            
        }

        .nav-btn {
            width:150px;
            height:50px;
            margin-left:23px;
            margin-right:23px;
            float:left;
            
            text-decoration:none; /*removes underline*/

            font-size:30px;
            line-height:50px; /*centering vertically when matching the height of the element*/

            text-align: center;

            background-color:rgb(221, 100, 6);
            color:white;

            font-family:Helvetica, sans-serif;

            border-radius:15px;

            box-shadow:0 0 8px black;
        }


        .nav-btn:visited {
            color:black;
        }

        .nav-btn:hover {
            background-image: url("images/btn_hover.PNG");
            color:white;
            background-size:150px;

            box-shadow:0 0 8px white; /*adds a glow*/
        }

        .nav-btn:active {
            box-shadow:0 0 8px rgb(81, 81, 223); /*adds a glow*/
        }

        #main-image {
            border:5px solid rgb(29, 29, 29);
            margin:10px;
            padding:20px;
            width:850px;
            margin-left:20px;
            box-shadow:0 0 8px black;
        }

        .special-img {
            width:100%;

        }

        #roof:hover {
            -webkit-transform:scaleX(-1);
            transform: scaleX(-1);
        }
        
        #footer {
            text-align:center;
        }

        a {
            background-color:orange;
            text-decoration:none;
            color:white;
        }

    </style>
</head>
<body>

    <!--WRAPPER / CONTAINER-->
    <div id="container">
        <!--HEADER-->
        <div id="header">
            <h1><em>Empire Records</em></h1>
        </div><!--/ #header-->

        <hr>
        <!--NAV-->
        <div id="nav">
            <div id="buttons">

                <a href="index.html" class="nav-btn">ABOUT</a>
                <a href="cast.html" class="nav-btn">CAST</a>
                <a href="review.html" class="nav-btn">REVIEW</a>

            </div><!--/ #buttons-->
        </div><!--/ #nav-->

        <hr>
        <!--CONTENT-->
        <div id="content">

            <h2>The <b>CAST</b> of the movie <em>Empire Records</em>!</h2>

            <!--reusable container for EACH actor (minimum of 5)-->
            <div class="character">

                <h3>Corey Mason</h3>

                <img src="images/liv.jpg" alt="red carpet portrait of Liv Tyler looking fabulous" height="50">

                <p>Liv Tyler</p>

                <hr>

            </div><!--end of / .character-->

            <!--reusable container for EACH actor (minimum of 5)-->
            <div class="character">

                <h3>Gina</h3>

                <img src="images/renee.jpg" alt="red carpet portrait of Renee Zellweger looking fabulous" height="50">

                <p>Ren&eacute;e Zellweger</p>

                <hr>

            </div><!--end of / .character-->

        </div><!--/ #content-->

        <hr>
        <!--FOOTER-->
        <div id="footer">
            <a href="#header" id="jump-top">Back to Top</a>
            <p id="copy">&copy;K TRUCHON | SE111 | 202630</p>

            <!--IMG: add a validation screenshot for THIS page-->
        <!--
            <img src="" alt="">
        -->
        </div><!--/ #footer-->

    </div><!--/ #container-->
    
</body>
</html>
